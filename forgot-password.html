<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MediWhats — Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --teal:    #0A9E80;
      --teal-dk: #077A62;
      --teal-lt: #E5F6F2;
      --teal-mid:#A8DED4;
      --ink:     #0C1C18;
      --muted:   #526860;
      --border:  #D0E5DF;
      --bg:      #F4F9F8;
      --white:   #FFFFFF;
      --red:     #D44444;
      --red-bg:  #FEF2F2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; display: flex; flex-direction: column; }

    header { background: var(--white); border-bottom: 1px solid var(--border); padding: 14px 40px; display: flex; align-items: center; justify-content: space-between; }
    .logo { font-family: 'Sora', sans-serif; font-size: 19px; font-weight: 700; color: var(--teal); display: flex; align-items: center; gap: 8px; }
    .logo-pulse { width: 9px; height: 9px; background: var(--teal); border-radius: 50%; animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:.7} }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }

    .card { background: var(--white); border-radius: 18px; border: 1px solid var(--border); width: 100%; max-width: 420px; overflow: hidden; }
    .card-hdr { background: var(--teal); padding: 24px 28px; text-align: center; }
    .card-hdr h1 { font-family: 'Sora', sans-serif; font-size: 20px; font-weight: 700; color: white; margin-bottom: 4px; }
    .card-hdr p { font-size: 13px; color: rgba(255,255,255,0.8); }
    .card-body { padding: 28px; }

    /* Steps */
    .steps { display: flex; margin-bottom: 24px; }
    .step { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 5px; position: relative; }
    .step:not(:last-child)::after { content: ''; position: absolute; top: 11px; left: 50%; width: 100%; height: 2px; background: var(--border); z-index: 0; }
    .step.done:not(:last-child)::after, .step.active:not(:last-child)::after { background: var(--teal-mid); }
    .sdot { width: 22px; height: 22px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: var(--muted); position: relative; z-index: 1; transition: all .25s; }
    .step.active .sdot { background: var(--teal); color: #fff; }
    .step.done .sdot { background: var(--teal-lt); color: var(--teal); }
    .slbl { font-size: 11px; color: var(--muted); text-align: center; }
    .step.active .slbl { color: var(--teal); font-weight: 500; }

    .fsec { display: none; }
    .fsec.on { display: block; }

    .field { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .04em; }
    input { width: 100%; padding: 11px 13px; border: 1px solid var(--border); border-radius: 9px; font-size: 14px; font-family: 'Inter', sans-serif; color: var(--ink); background: var(--white); outline: none; transition: border-color .2s, box-shadow .2s; }
    input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(10,158,128,.1); }

    .btn { width: 100%; padding: 13px; background: var(--teal); color: white; border: none; border-radius: 10px; font-size: 15px; font-family: 'Sora', sans-serif; font-weight: 600; cursor: pointer; transition: background .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn:hover { background: var(--teal-dk); }
    .btn:disabled { background: var(--teal-mid); cursor: not-allowed; }
    .back-btn { background: none; border: none; color: var(--muted); font-size: 13px; cursor: pointer; padding: 0 0 14px; display: flex; align-items: center; gap: 4px; }
    .back-btn:hover { color: var(--ink); }

    .alert { padding: 11px 13px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .alert.error { background: var(--red-bg); color: var(--red); border: 1px solid #FECACA; display: block; }
    .alert.success { background: var(--teal-lt); color: var(--teal-dk); border: 1px solid var(--teal-mid); display: block; }

    .otp-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    .otp-input { width: 48px; height: 56px; text-align: center; font-size: 22px; font-weight: 700; font-family: 'Sora', sans-serif; border: 1.5px solid var(--border); border-radius: 10px; outline: none; color: var(--ink); transition: border-color .2s, box-shadow .2s; }
    .otp-input:focus { border-color: var(--teal); box-shadow: 0 0 0 3px rgba(10,158,128,.1); }

    .hint { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 20px; line-height: 1.6; }
    .hint strong { color: var(--ink); }

    .resend { text-align: center; margin-top: 14px; font-size: 13px; color: var(--muted); }
    .resend a { color: var(--teal); cursor: pointer; text-decoration: none; font-weight: 500; }

    .success-state { text-align: center; padding: 16px 0; display: none; }
    .success-state.on { display: block; }
    .sico { width: 60px; height: 60px; background: var(--teal-lt); border-radius: 50%; margin: 0 auto 18px; display: flex; align-items: center; justify-content: center; }
    .success-state h3 { font-family: 'Sora', sans-serif; font-size: 19px; font-weight: 700; margin-bottom: 8px; }
    .success-state p { font-size: 14px; color: var(--muted); margin-bottom: 20px; }

    .spin { width: 17px; height: 17px; border: 2px solid rgba(255,255,255,.35); border-top-color: white; border-radius: 50%; animation: sp .7s linear infinite; display: none; }
    @keyframes sp { to { transform: rotate(360deg); } }
    .btn.loading .spin { display: block; }
    .btn.loading .btxt { display: none; }

    .login-link { text-align: center; margin-top: 20px; font-size: 13.5px; color: var(--muted); }
    .login-link a { color: var(--teal); font-weight: 500; text-decoration: none; }
  </style>
</head>
<body>

<header>
  <div class="logo"><div class="logo-pulse"></div>MediWhats</div>
  <div style="font-size:13px;color:var(--muted)">Password Reset</div>
</header>

<main>
  <div class="card">
    <div class="card-hdr">
      <h1>Reset Password</h1>
      <p>We'll send an OTP to your registered email</p>
    </div>
    <div class="card-body">

      <!-- Steps -->
      <div class="steps">
        <div class="step active" id="st1"><div class="sdot">1</div><div class="slbl">Email</div></div>
        <div class="step" id="st2"><div class="sdot">2</div><div class="slbl">OTP</div></div>
        <div class="step" id="st3"><div class="sdot">3</div><div class="slbl">New Password</div></div>
      </div>

      <div id="alert" class="alert"></div>

      <!-- STEP 1: EMAIL -->
      <div class="fsec on" id="s1">
        <div class="field">
          <label>Registered Email</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
        </div>
        <button class="btn" id="btn1" onclick="sendOTP()">
          <div class="spin"></div>
          <span class="btxt">Send OTP →</span>
        </button>
        <div class="login-link"><a href="login.html">← Back to Login</a></div>
      </div>

      <!-- STEP 2: OTP -->
      <div class="fsec" id="s2">
        <p class="hint">Enter the 6-digit OTP sent to<br><strong id="hint-email"></strong></p>
        <div class="otp-inputs">
          <input class="otp-input" id="o1" maxlength="1" type="text" inputmode="numeric"/>
          <input class="otp-input" id="o2" maxlength="1" type="text" inputmode="numeric"/>
          <input class="otp-input" id="o3" maxlength="1" type="text" inputmode="numeric"/>
          <input class="otp-input" id="o4" maxlength="1" type="text" inputmode="numeric"/>
          <input class="otp-input" id="o5" maxlength="1" type="text" inputmode="numeric"/>
          <input class="otp-input" id="o6" maxlength="1" type="text" inputmode="numeric"/>
        </div>
        <button class="btn" id="btn2" onclick="verifyOTP()">
          <div class="spin"></div>
          <span class="btxt">Verify OTP →</span>
        </button>
        <div class="resend">Didn't receive it? <a onclick="resendOTP()">Resend OTP</a></div>
      </div>

      <!-- STEP 3: NEW PASSWORD -->
      <div class="fsec" id="s3">
        <button class="back-btn" onclick="goStep(2)">← Back</button>
        <div class="field">
          <label>New Password</label>
          <input type="password" id="pwd1" placeholder="Minimum 8 characters"/>
        </div>
        <div class="field">
          <label>Confirm Password</label>
          <input type="password" id="pwd2" placeholder="Repeat your new password"/>
        </div>
        <button class="btn" id="btn3" onclick="resetPassword()">
          <div class="spin"></div>
          <span class="btxt">Reset Password →</span>
        </button>
      </div>

      <!-- SUCCESS -->
      <div class="success-state" id="success">
        <div class="sico">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><path d="M6 14l5.5 5.5L22 8" stroke="#0A9E80" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </div>
        <h3>Password Reset! ✅</h3>
        <p>Your password has been updated successfully.</p>
        <a href="login.html" class="btn" style="text-decoration:none">Go to Login →</a>
      </div>

    </div>
  </div>
</main>

<script>
  const API = 'https://smartgumastha-backend-production.up.railway.app/api';
  let userEmail   = '';
  let resetToken  = '';

  // ── OTP input auto-advance ────────────────────────────────
  ['o1','o2','o3','o4','o5','o6'].forEach(function(id, i, arr) {
    var el = document.getElementById(id);
    el.addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '');
      if (this.value && i < arr.length - 1) document.getElementById(arr[i+1]).focus();
    });
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Backspace' && !this.value && i > 0) document.getElementById(arr[i-1]).focus();
    });
  });

  function getOTP() {
    return ['o1','o2','o3','o4','o5','o6'].map(function(id) { return document.getElementById(id).value; }).join('');
  }

  function goStep(n) {
    [1,2,3].forEach(function(i) {
      document.getElementById('s'+i).classList.toggle('on', i===n);
      var t = document.getElementById('st'+i);
      t.classList.remove('active','done');
      if(i===n) t.classList.add('active');
      else if(i<n) t.classList.add('done');
    });
    clearAlert();
  }

  // ── Step 1: Send OTP ──────────────────────────────────────
  async function sendOTP() {
    userEmail = document.getElementById('email').value.trim();
    if (!userEmail) { showAlert('Please enter your email address.', 'error'); return; }

    setBtnLoading('btn1', true);
    clearAlert();
    try {
      var res = await fetch(API + '/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail })
      });
      var d = await res.json();
      if (d.success) {
        document.getElementById('hint-email').textContent = userEmail;
        goStep(2);
        document.getElementById('o1').focus();
      } else {
        showAlert(d.error || 'Failed to send OTP. Please try again.', 'error');
      }
    } catch(e) {
      showAlert('Network error. Please try again.', 'error');
    }
    setBtnLoading('btn1', false);
  }

  // ── Step 2: Verify OTP ────────────────────────────────────
  async function verifyOTP() {
    var otp = getOTP();
    if (otp.length !== 6) { showAlert('Please enter all 6 digits of the OTP.', 'error'); return; }

    setBtnLoading('btn2', true);
    clearAlert();
    try {
      var res = await fetch(API + '/auth/verify-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, otp: otp })
      });
      var d = await res.json();
      if (d.success) {
        resetToken = d.reset_token;
        goStep(3);
        document.getElementById('pwd1').focus();
      } else {
        showAlert(d.error || 'Invalid OTP. Please try again.', 'error');
      }
    } catch(e) {
      showAlert('Network error. Please try again.', 'error');
    }
    setBtnLoading('btn2', false);
  }

  // ── Resend OTP ────────────────────────────────────────────
  async function resendOTP() {
    ['o1','o2','o3','o4','o5','o6'].forEach(function(id) { document.getElementById(id).value = ''; });
    clearAlert();
    try {
      await fetch(API + '/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail })
      });
      showAlert('New OTP sent to ' + userEmail, 'success');
      document.getElementById('o1').focus();
    } catch(e) {
      showAlert('Failed to resend. Please try again.', 'error');
    }
  }

  // ── Step 3: Reset Password ────────────────────────────────
  async function resetPassword() {
    var pwd1 = document.getElementById('pwd1').value;
    var pwd2 = document.getElementById('pwd2').value;
    if (!pwd1 || pwd1.length < 8) { showAlert('Password must be at least 8 characters.', 'error'); return; }
    if (pwd1 !== pwd2) { showAlert('Passwords do not match.', 'error'); return; }

    setBtnLoading('btn3', true);
    clearAlert();
    try {
      var res = await fetch(API + '/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: userEmail, reset_token: resetToken, new_password: pwd1 })
      });
      var d = await res.json();
      if (d.success) {
        document.getElementById('s3').classList.remove('on');
        document.getElementById('success').classList.add('on');
        ['st1','st2','st3'].forEach(function(id) {
          document.getElementById(id).classList.remove('active');
          document.getElementById(id).classList.add('done');
        });
      } else {
        showAlert(d.error || 'Reset failed. Please try again.', 'error');
      }
    } catch(e) {
      showAlert('Network error. Please try again.', 'error');
    }
    setBtnLoading('btn3', false);
  }

  function setBtnLoading(id, on) {
    var btn = document.getElementById(id);
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }
  function showAlert(msg, type) {
    var el = document.getElementById('alert');
    el.textContent = msg;
    el.className = 'alert ' + type;
  }
  function clearAlert() { document.getElementById('alert').className = 'alert'; }

  // Enter key
  document.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    if (document.getElementById('s1').classList.contains('on')) sendOTP();
    else if (document.getElementById('s2').classList.contains('on')) verifyOTP();
    else if (document.getElementById('s3').classList.contains('on')) resetPassword();
  });
</script>
</body>
</html>
